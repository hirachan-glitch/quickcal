<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ドローン">
<meta name="theme-color" content="#0a0e14">
<title>ドローンシミュレーター</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0e14;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", Roboto, sans-serif;
  }
  body { position: fixed; inset: 0; }

  canvas#scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 1;
  }
  #controls {
    position: absolute;
    inset: 0;
    z-index: 20;
  }

  /* ---------- portrait: "rotate your phone" overlay ---------- */
  #rotate-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #0a0e14;
    color: #cfe6ff;
    text-align: center;
    padding: 24px;
  }
  #rotate-overlay .phone-icon {
    width: 46px;
    height: 78px;
    border: 3px solid #cfe6ff;
    border-radius: 9px;
    position: relative;
    animation: rotate-hint 2s ease-in-out infinite;
  }
  #rotate-overlay .phone-icon::after {
    content: "";
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 3px;
    border-radius: 2px;
    background: #cfe6ff;
  }
  @keyframes rotate-hint {
    0%, 25%   { transform: rotate(0deg); }
    55%, 100% { transform: rotate(90deg); }
  }
  #rotate-overlay h1 { font-size: 20px; font-weight: 700; }
  #rotate-overlay p  { font-size: 13px; color: rgba(190, 220, 255, 0.6); }
  @media (orientation: portrait) {
    #rotate-overlay { display: flex; }
  }

  /* ---------- start overlay (how to play, Mode-2 legend) ---------- */
  #start-overlay {
    position: fixed;
    inset: 0;
    z-index: 150;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(6, 10, 16, 0.88);
    color: #eaf4ff;
    text-align: center;
    padding: 16px calc(16px + env(safe-area-inset-right, 0px)) 16px calc(16px + env(safe-area-inset-left, 0px));
  }
  #start-overlay h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  #start-overlay .legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #start-overlay .legend div {
    background: rgba(20, 30, 44, 0.85);
    border: 1px solid rgba(140, 200, 255, 0.3);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12.5px;
    line-height: 1.7;
    text-align: left;
    min-width: 200px;
  }
  #start-overlay .legend b {
    color: #7ddcff;
    display: block;
    font-size: 13px;
    margin-bottom: 2px;
  }
  #start-overlay .goal {
    font-size: 12.5px;
    color: rgba(190, 220, 255, 0.75);
  }
  #start-btn {
    appearance: none;
    border: 2px solid rgba(160, 255, 200, 0.8);
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(60, 220, 120, 0.95), rgba(20, 130, 70, 0.95));
    color: #04180a;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.08em;
    padding: 12px 42px;
    margin-top: 4px;
    box-shadow: 0 4px 18px rgba(40, 200, 110, 0.4);
    cursor: pointer;
  }
  #start-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

  <canvas id="scene"></canvas>
  <div id="controls"></div>

  <!-- start overlay: brief JP how-to (Mode-2), START arms the drone -->
  <div id="start-overlay">
    <h1>ドローンシミュレーター</h1>
    <div class="legend">
      <div>
        <b>左スティック（Mode 2）</b>
        上下：上昇・下降（スロットル・保持式）<br>
        左右：旋回（ヨー）
      </div>
      <div>
        <b>右スティック</b>
        上下：前進・後退（ピッチ）<br>
        左右：左右移動（ロール）
      </div>
    </div>
    <p class="goal">スタートで自動的にふわっと離陸します。左スティックで高度を調整。<br>
    黄色いゲートを順番にくぐってコースを周回しよう。<br>
    墜落したら <b>RESET</b>、モード切替は <b>ANGLE/ACRO</b>、視点は <b>CAM</b>。</p>
    <button id="start-btn" type="button">スタート / START</button>
  </div>

  <!-- portrait warning: shown only in portrait orientation -->
  <div id="rotate-overlay">
    <div class="phone-icon"></div>
    <h1>横画面にしてください</h1>
    <p>このシミュレーターは横向き専用です。スマホを横に回転してください。</p>
  </div>

  <script src="js/physics.js"></script>
  <script src="js/world.js"></script>
  <script src="js/render.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
